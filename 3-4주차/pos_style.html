<style>
     
#pos1{
    position: absolute;
    top: 50px;
    left: 50px;
}
#pos2{
    position: absolute;
    top: 100px;
    right: 100px;
}

#pos3{
    position: absolute;
    bottom: 150px;
    left: 50%;
}
#static{
    position: static;
}
#relative1{
    position: relative;
    top: 50px;
    left: 50px;
}
#relative2{
    position: relative;
    top: 100px;
    right: 10px;
}
#fixed{
    position: fixed;
    top: 30px; ;
    left: 30px;
}
</style>

<body>
    <div>
        <p id="static">이것은 static 위치입니다. </p>
        <p id="relative1">이것은 relative 위치입니다. </p>
        <p id="relative2">이것은 relativ2 위치입니다. </p>
        <p id="fixed">이것은 fixed 위치입니다. </p>
    </div>
</body>

<body>
    <div>
    <p id="pos1">이것은 첫 번째 단락입니다. </p>
    <p id="pos2">이것은 두 번째 단락입니다. </p>
    <p id="pos3">이것은 세 번째 단락입니다. </p>
    </div>
</body>
