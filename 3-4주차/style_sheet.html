<!DOCTYPE html>
<html lang="ko">
<head>     <!--문서안의 스타일은 head 태그 안에 style 태그로 작성하지만, 외부 스타일 시트는 별도의 파일로 만들어 link 태그로 연결한다-->
    <meta charset="UTF-8">
    <title>상품소개 페이지</title> <!--검색창 상단 페이지 제목-->
    <style>
        * {             /*전체 선택자*/    
            margin: 0;
        }
        p {                     /*태그 선택자*/
            font-style : italic; /*이탈릭체*/
        }      
        .accent{                /*클래스 선택자*/
            border: 1px solid #000; /*테두리*/
            padding: 5px;
        }    
        .bg {
            background-color: #ca8383; /*배경색*/
        }
        #container {             /*id 선택자*/
            width: 500px;/*너비*/
            margin: 10px auto; /*중앙배치*/
            padding: 10px ; /*테두리와 내용사이 여백*/
            border: 1px solid #000 ; /*테두리 굵기와 색깔*/          
        }
    </style>  
    <link rel="stylesheet" href="style.css">     <!--외부 스타일 시트-->
</head>

<body>
    <h1> 외부스타일 시트 적용 </h1>
    <h2>레드향 (일반)</h2>
    <h1 class="accent bg">레드향 (클래스 사용)</h1>
    <p>껍질이 붉은 빛이 돌아 <span class="accent">레드향(클래스 사용)</span>이라 불린다.</p>
    <p>껍질이 붉은 빛이 돌아 레드향이라 불린다.</p>
    <p>레드향은 한라봉과 귤이 교배한 것이다.</p>
    <p>비타민 C가 많고 감기예방에 좋다.</p>
    
    <div id="container"> ID 선택자 적용
    <p>껍질이 붉은 빛이 돌아 레드향이라 불린다.</p>
    <p>레드향은 한라봉과 귤이 교배한 것이다.</p>
    <p>비타민 C가 많고 감기예방에 좋다.</p>
    </div>
</body>
</html>
