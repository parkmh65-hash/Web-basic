
<head>     <!--문서안의 스타일은 head 태그 안에 style 태그로 작성하지만, 외부 스타일 시트는 별도의 파일로 만들어 link 태그로 연결한다-->
    <meta charset="UTF-8">
    <title>리스트 스타일</title> <!--검색창 상단 페이지 제목-->
<style>
    .book1 {
        list-style-type: none;
    }   
    .book2 {
        list-style-type: upper-alpha;
    } 
  
    ul{
       
    }
    
</style>
</head>

<body>
<ul class="book1">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>   
</ul>
<ul class="book2">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>   
</ul>

<ul  style="list-style-image: url('image/bird.avif');">
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>   
</ul>
</body>
