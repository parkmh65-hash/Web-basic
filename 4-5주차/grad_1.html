<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그러데이션 배경</title>
    <style>
        /* 페이지 전체의 여백을 제거하고 높이를 100%로 설정 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        /* 배경에만 그러데이션 적용 */
        .gradient-background {
            width: 100%;
            height: 100%;
   
            /* 45도 각도로 세 가지 색상이 섞이는 선형 그러데이션 */
            background: repeating-radial-gradient(blue, blue 20%, yellow,yellow 20%,red, red 40%);


            /* 배경이 움직이는 애니메이션 추가 (선택 사항) */

        }

        /* 배경 애니메이션 정의 */


    </style>
</head>
<body>
    <!-- 내용은 없고 그러데이션 배경만 있는 컨테이너 -->
    <div class="gradient-background"></div>
</body>
</html>
