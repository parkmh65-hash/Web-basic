<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴욕의 일몰 풍경</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Malgun Gothic', sans-serif;
        }
        .container {
            position : relative;
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 90%;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
            display: block;
        }
        h1 {
            position : absolute;
            right:100px;
            bottom: 100px;
            margin-top: 20px;
            color: #d1dacb;
            font-size: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 업로드된 이미지 표시 -->
        <img src="newyork.png" alt="뉴욕의 일몰 풍경">
        
        <!-- 하단 제목 표시 -->
        <h1>뉴욕의 일몰 풍경</h1>
    </div>

</body>
</html>
